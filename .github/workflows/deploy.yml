name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use coturiv/setup-ionic
      uses: coturiv/setup-ionic@v1
      with:
        cordova-version: 8
        install-java: false
        install-pods: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: |
        npm ci --legacy-peer-deps
        npm i -D -E @angular/cli --legacy-peer-deps

    - name: Build for production
      run: |
        rm -rf www/
        ionic build --prod -- --base-href '/money-mate/'
        cp www/index.html www/404.html
        
        # Fix service worker paths for subdirectory on custom domain
        sed -i "s|'/\([^']*\)|'/money-mate/\1|g" www/sw.js
        sed -i "s|'/',|'/money-mate/',|g" www/sw.js
        
        # Fix manifest.json paths
        sed -i 's|"start_url": "/"|"start_url": "/money-mate/"|g' www/manifest.json
        sed -i 's|"/assets/|"/money-mate/assets/|g' www/manifest.json
        
        # Fix HTML manifest and service worker references
        sed -i 's|href="/manifest.json"|href="/money-mate/manifest.json"|g' www/index.html
        sed -i 's|href="/manifest.json"|href="/money-mate/manifest.json"|g' www/404.html
        
        # Fix service worker registration path in main JS files
        find www -name "*.js" -exec sed -i "s|navigator.serviceWorker.register('/sw.js')|navigator.serviceWorker.register('/money-mate/sw.js')|g" {} \;
        find www -name "*.js" -exec sed -i "s|'/sw.js'|'/money-mate/sw.js'|g" {} \;
        
        ls -la www/

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./www

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4