<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/settings/accounts"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
    <ion-buttons slot="end">
      <ion-button [disabled]="!canSave" (click)="save()">
        {{ saving ? 'Saving...' : 'Save' }}
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ pageTitle }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="state-container" *ngIf="loading">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Loading account...</p>
  </div>

  <div class="state-container error" *ngIf="!loading && error">
    <p>{{ error }}</p>
    <ion-button fill="outline" (click)="cancel()">Back</ion-button>
  </div>

  <ion-list *ngIf="!loading && !error">
    <ion-item class="name-item">
      <ion-button class="icon-edit-button" fill="clear" (click)="openIconPicker()">
        <ion-icon [name]="form.icon || 'wallet-outline'" [style.color]="form.color || '#2196F3'"></ion-icon>
        <ion-icon class="edit-indicator" name="create-outline"></ion-icon>
      </ion-button>

      <div class="name-field-block">
        <ion-label class="name-label">Name *</ion-label>
        <ion-input [(ngModel)]="form.name" placeholder="Account name"></ion-input>
      </div>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Type</ion-label>
      <ion-select [(ngModel)]="form.type">
        <ion-select-option value="cash">Cash</ion-select-option>
        <ion-select-option value="checking">Checking</ion-select-option>
        <ion-select-option value="savings">Savings</ion-select-option>
        <ion-select-option value="credit">Credit</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Current Balance</ion-label>
      <ion-input
        type="number"
        inputmode="decimal"
        [ngModel]="form.balance"
        (ngModelChange)="onBalanceChange($event)"
        placeholder="0"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Owner Name</ion-label>
      <ion-input [(ngModel)]="form.ownerName" placeholder="Account owner"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label>Active</ion-label>
      <ion-toggle [(ngModel)]="form.isActive" slot="end"></ion-toggle>
    </ion-item>
  </ion-list>
</ion-content>
