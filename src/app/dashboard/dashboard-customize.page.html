<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Customize Dashboard</ion-title>
    <ion-buttons slot="end">
      <ion-button aria-label="Save dashboard layout" (click)="save()">
        <ion-icon slot="icon-only" name="save-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list lines="full" class="customize-list">
    <ion-reorder-group [disabled]="false" (ionItemReorder)="handleReorder($event)">
      <ion-item *ngFor="let widget of widgets; trackBy: trackByWidgetId">
        <ion-label class="widget-label-row">
          <div class="widget-row">
            <div class="widget-info">
              <h2><strong>{{ widget.title }}</strong></h2>
              <p style="color: #888;">{{ widget.subtitle }}</p>
            </div>
          </div>
            <img
              class="widget-icon-preview"
              [src]="getWidgetIconPath(widget.id)"
              [alt]="widget.title + ' preview'"
              loading="lazy"
              aria-hidden="true"
            />
        </ion-label>

        <ion-toggle
          slot="end"
          [checked]="widget.visible"
          (ionChange)="onToggleVisibility(widget.id, $event.detail.checked)"
          aria-label="Show {{ widget.title }}">
        </ion-toggle>

        <ion-reorder slot="end"></ion-reorder>
      </ion-item>
    </ion-reorder-group>
  </ion-list>

  <div class="actions">
    <ion-button fill="outline" expand="block" (click)="resetToDefault()">
      Reset to default
    </ion-button>
    <ion-button expand="block" (click)="save()">
      Save layout
    </ion-button>
  </div>
</ion-content>
