<ion-card class="expense-comparison-card">
  <ion-card-header>
    <div class="header-row">
      <div>
        <ion-card-title>Expense Comparison</ion-card-title>
        <ion-card-subtitle>This month vs monthly average — by category</ion-card-subtitle>
      </div>

      <ion-button
        fill="clear"
        class="settings-button"
        [class.has-saved-selection]="hasSavedSettings"
        [attr.aria-label]="hasSavedSettings ? 'Edit widget settings' : 'Open widget settings'"
        (click)="openCategorySettings()"
      >
        <ion-icon slot="icon-only" [name]="settingsIconName"></ion-icon>
      </ion-button>
    </div>
  </ion-card-header>

  <ion-card-content>
    <ion-text color="medium" *ngIf="loading">
      <p class="state-text">Loading expense comparison...</p>
    </ion-text>

    <ion-text color="danger" *ngIf="!loading && error">
      <p class="state-text">{{ error }}</p>
    </ion-text>

    <ion-text color="medium" *ngIf="!loading && !error && chartLoadError">
      <p class="state-text">Chart is unavailable. Please check your internet connection.</p>
    </ion-text>

    <ion-text color="medium" *ngIf="!loading && !error && !chartLoadError && !hasChartData">
      <p class="state-text">No expense transactions found for this month.</p>
    </ion-text>

    <div
      class="chart-scroll-container"
      *ngIf="!loading && !error && !chartLoadError && hasChartData"
    >
      <div class="chart-inner" [style.width.px]="chartWidth">
        <google-chart
          [type]="chartType"
          [columns]="chartColumns"
          [data]="chartData"
          [options]="chartOptions"
          [width]="chartWidth"
          [height]="300"
          (error)="onChartError()"
        ></google-chart>
      </div>
    </div>
  </ion-card-content>
</ion-card>
